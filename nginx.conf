limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    client_max_body_size 1m;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;

    # Serve uploaded files directly — never hit Python for static files.
    # NOTE: this path is ungated. Watermark + gallery-password protection rely on the
    # stored filename and gallery id being unguessable UUIDv4s; the protected variants
    # (watermarked OR downloads-disabled galleries) are served through the Python route
    # (/api/public/.../thumb|small|medium) which serves by image id and never exposes the raw
    # stored filename — so the sibling original/ path can't be derived. Do not advertise /uploads/
    # paths for protected galleries. See docs/architecture/access-control-and-media-serving.md.
    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    # Serve branding assets (logo, gallery headers)
    location /branding/ {
        alias /data/branding/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "script-src 'none'";
    }

    # Large body for image + video upload (matches backend max_video_bytes = 2 GB).
    # Stream the body straight to the backend instead of buffering 2 GB to disk first,
    # and allow long uploads on slow links.
    location ~ ^/api/galleries/[^/]+/images$ {
        client_max_body_size 2g;
        proxy_request_buffering off;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Rate-limit auth endpoints (5 req/min per IP, burst 5)
    location ~ ^/api/(auth/login|public/g/.+/auth)$ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket → FastAPI/uvicorn (live gallery updates). Needs the HTTP/1.1 upgrade dance and a
    # long read timeout so idle sockets aren't dropped between events (the app heartbeats anyway).
    location ^~ /api/ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # API → FastAPI/uvicorn
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # Everything else → Next.js
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
