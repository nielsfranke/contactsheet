limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

resolver 127.0.0.11 valid=30s ipv6=off;

server {
    listen 80;
    client_max_body_size 1m;

    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header Referrer-Policy strict-origin-when-cross-origin;
    # The app's Content-Security-Policy is set per-request (with a fresh nonce) by the Next.js proxy
    # (frontend/src/proxy.ts) and passed through on proxied responses — it can't live here because
    # nginx can't mint a nonce the app also knows. The /branding and /uploads static mounts below
    # keep their own stricter CSPs. (Tip: terminate TLS and add HSTS at your edge proxy — see README.)

    location /uploads/ {
        alias /data/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options nosniff;
    }

    location /branding/ {
        alias /data/branding/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff;
        add_header Content-Security-Policy "script-src 'none'";
    }

    # Both the admin upload (/api/galleries/{id}/images) and the public client upload
    # (/api/public/g/{token}/images). Without the public path here it would fall through to the
    # `location /api/` block and inherit the 1 MB server default — 413-ing every real photo a
    # visitor uploads. The backend enforces the real per-tier size caps; 2g is just a ceiling.
    location ~ ^/api/(galleries/[^/]+|public/g/[^/]+)/images$ {
        client_max_body_size 2g;
        proxy_request_buffering off;
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Full-instance backup & restore. The restore upload (POST .../restore) carries an entire
    # backup archive, and the download (GET .../backup/{id}/download) streams one back — both
    # would otherwise fall through to `location /api/` and inherit the 1 MB cap + 120s timeout,
    # 413-ing or truncating any real backup. 2g is just a ceiling; the work is also slow (DB
    # snapshot/swap + migration), so the timeouts are generous. See docs/backup-and-restore.md.
    location ~ ^/api/admin/settings/(backup|restore) {
        client_max_body_size 2g;
        proxy_request_buffering off;
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
        proxy_send_timeout 1800s;
    }

    # Admin image uploads that are NOT photo originals: gallery header/cover, instance logo, and
    # watermark. They'd otherwise fall through to `location /api/` and inherit the 1 MB server
    # default — 413-ing any header/cover/logo over 1 MB before it reaches the backend (which allows
    # 10 MB). 12m is just a ceiling above that backend cap. See
    # docs/architecture/header-cover-uploads-and-og-image-sizing.md.
    location ~ ^/api/(galleries/[^/]+/(header-image|cover-image|watermark)|admin/settings/logo) {
        client_max_body_size 12m;
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/(auth/login|public/g/.+/auth)$ {
        limit_req zone=auth burst=5 nodelay;
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ws/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location /api/ {
        set $backend "http://backend:8000";
        proxy_pass $backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    location / {
        set $frontend "http://frontend:3000";
        proxy_pass $frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_cache_bypass $http_upgrade;
    }
}
