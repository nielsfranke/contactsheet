#
# Builds and pushes the multi-arch backend + frontend images on a version tag.
# Tags are cut on Forgejo and reach GitHub via the push-mirror, which fires this
# workflow. GHCR is pushed with the built-in GITHUB_TOKEN (no secret needed); the
# Forgejo registry is pushed too when FORGEJO_REGISTRY_USER/TOKEN secrets are set.

name: Release images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 1.0.2 (defaults to the current tag)."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    # Only run on GitHub Actions. The Forgejo mirror may surface this file too, but it
    # has no runner today — this guard keeps it a no-op there even if one is added.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tags
        id: meta
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          IMG="contactsheet-${{ matrix.image }}"
          # :latest only moves for final releases (skip on prereleases like 1.0.2-rc1).
          is_final=true
          case "$VERSION" in *-*) is_final=false ;; esac

          TAGS="ghcr.io/nielsfranke/${IMG}:${VERSION}"
          $is_final && TAGS="${TAGS}"$'\n'"ghcr.io/nielsfranke/${IMG}:latest"
          if [ -n "${FORGEJO_TOKEN}" ]; then
            TAGS="${TAGS}"$'\n'"forgejo.nielsbox.cc/niels/${IMG}:${VERSION}"
            $is_final && TAGS="${TAGS}"$'\n'"forgejo.nielsbox.cc/niels/${IMG}:latest"
            echo "forgejo=true" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Forgejo registry
        if: ${{ steps.meta.outputs.forgejo == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: forgejo.nielsbox.cc
          username: ${{ secrets.FORGEJO_REGISTRY_USER }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # Publishes the GitHub release (always) and the Forgejo release (when FORGEJO_API_TOKEN is set)
  # from the hand-written CHANGELOG entry. Tag-pushes only — never on the workflow_dispatch test run.
  release:
    needs: images
    if: ${{ github.server_url == 'https://github.com' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: ${{ github.repository }}
      FORGEJO_API_TOKEN: ${{ secrets.FORGEJO_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          # Title from the annotated tag subject ("ContactSheet vX.Y.Z — …" → "vX.Y.Z — …").
          SUBJECT="$(git tag -l "$TAG" --format='%(contents:subject)')"
          TITLE="${SUBJECT#ContactSheet }"
          [ -n "$TITLE" ] || TITLE="$TAG"
          PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
          {
            python3 scripts/changelog-extract.py "$VERSION"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/$REPO/compare/$PREV...$TAG"
            fi
          } > notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.notes.outputs.tag }}
          TITLE: ${{ steps.notes.outputs.title }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md
          else
            gh release create "$TAG" --title "$TITLE" --notes-file notes.md --verify-tag
          fi

      - name: Publish the Forgejo release
        if: ${{ env.FORGEJO_API_TOKEN != '' }}
        env:
          TAG: ${{ steps.notes.outputs.tag }}
          TITLE: ${{ steps.notes.outputs.title }}
        run: |
          set -euo pipefail
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error
          tag, title = os.environ["TAG"], os.environ["TITLE"]
          body = open("notes.md", encoding="utf-8").read()
          base = "https://forgejo.nielsbox.cc/api/v1/repos/niels/ContactSheet/releases"
          hdr = {"Authorization": f"token {os.environ['FORGEJO_API_TOKEN']}",
                 "Content-Type": "application/json"}
          payload = {"tag_name": tag, "name": title, "body": body,
                     "draft": False, "prerelease": False}

          def call(method, url, data=None):
              req = urllib.request.Request(
                  url, data=json.dumps(data).encode() if data else None,
                  headers=hdr, method=method)
              try:
                  with urllib.request.urlopen(req) as r:
                      return r.status, json.load(r)
              except urllib.error.HTTPError as e:
                  return e.code, e.read().decode()

          st, res = call("POST", base, payload)
          if st == 201:
              print("Forgejo release created")
          else:
              st2, rel = call("GET", f"{base}/tags/{tag}")
              if st2 == 200 and isinstance(rel, dict) and "id" in rel:
                  st3, _ = call("PATCH", f"{base}/{rel['id']}", payload)
                  print(f"Forgejo release updated (HTTP {st3})")
              else:
                  raise SystemExit(f"Forgejo release failed: POST {st} {res} / GET {st2}")
          PYEOF
