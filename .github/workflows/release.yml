#
# Builds and pushes the multi-arch backend + frontend images on a version tag.
# Tags are cut on Forgejo and reach GitHub via the push-mirror, which fires this
# workflow. GHCR is pushed with the built-in GITHUB_TOKEN (no secret needed); the
# Forgejo registry is pushed too when FORGEJO_REGISTRY_USER/TOKEN secrets are set.

name: Release images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 1.0.2 (defaults to the current tag)."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    # Only run on GitHub Actions. The Forgejo mirror may surface this file too, but it
    # has no runner today — this guard keeps it a no-op there even if one is added.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tags
        id: meta
        env:
          FORGEJO_TOKEN: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          IMG="contactsheet-${{ matrix.image }}"
          # :latest only moves for final releases (skip on prereleases like 1.0.2-rc1).
          is_final=true
          case "$VERSION" in *-*) is_final=false ;; esac

          TAGS="ghcr.io/nielsfranke/${IMG}:${VERSION}"
          $is_final && TAGS="${TAGS}"$'\n'"ghcr.io/nielsfranke/${IMG}:latest"
          if [ -n "${FORGEJO_TOKEN}" ]; then
            TAGS="${TAGS}"$'\n'"forgejo.nielsbox.cc/niels/${IMG}:${VERSION}"
            $is_final && TAGS="${TAGS}"$'\n'"forgejo.nielsbox.cc/niels/${IMG}:latest"
            echo "forgejo=true" >> "$GITHUB_OUTPUT"
          fi

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to the Forgejo registry
        if: ${{ steps.meta.outputs.forgejo == 'true' }}
        uses: docker/login-action@v3
        with:
          registry: forgejo.nielsbox.cc
          username: ${{ secrets.FORGEJO_REGISTRY_USER }}
          password: ${{ secrets.FORGEJO_REGISTRY_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          target: ${{ matrix.image }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}
