#
# Builds and pushes the multi-arch backend + frontend + ml images on a version tag.
# Tags are cut on Forgejo and reach GitHub via the push-mirror, which fires this
# workflow. GHCR is pushed with the built-in GITHUB_TOKEN (no secret needed).
# (ml is the optional semantic-search sidecar — its own Dockerfile, opt-in at deploy.)

name: Release images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 1.0.2 (defaults to the current tag)."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  images:
    # Only run on GitHub Actions. The Forgejo mirror may surface this file too, but it
    # has no runner today — this guard keeps it a no-op there even if one is added.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: backend
            dockerfile: ./Dockerfile
            target: backend
          - image: frontend
            dockerfile: ./Dockerfile
            target: frontend
          - image: ml
            dockerfile: ./ml/Dockerfile
            target: ml
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version and tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          IMG="contactsheet-${{ matrix.image }}"
          # :latest only moves for final releases (skip on prereleases like 1.0.2-rc1).
          is_final=true
          case "$VERSION" in *-*) is_final=false ;; esac

          TAGS="ghcr.io/nielsfranke/${IMG}:${VERSION}"
          $is_final && TAGS="${TAGS}"$'\n'"ghcr.io/nielsfranke/${IMG}:latest"

          {
            echo "tags<<EOF"
            echo "${TAGS}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.image }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # Publishes the GitHub release from the hand-written CHANGELOG entry.
  # Tag-pushes only — never on the workflow_dispatch test run.
  release:
    needs: images
    if: ${{ github.server_url == 'https://github.com' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble release notes
        id: notes
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          # Title from the annotated tag subject ("ContactSheet vX.Y.Z — …" → "vX.Y.Z — …").
          SUBJECT="$(git tag -l "$TAG" --format='%(contents:subject)')"
          TITLE="${SUBJECT#ContactSheet }"
          [ -n "$TITLE" ] || TITLE="$TAG"
          PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
          {
            python3 scripts/changelog-extract.py "$VERSION"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/$REPO/compare/$PREV...$TAG"
            fi
          } > notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.notes.outputs.tag }}
          TITLE: ${{ steps.notes.outputs.title }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md
          else
            gh release create "$TAG" --title "$TITLE" --notes-file notes.md --verify-tag
          fi
