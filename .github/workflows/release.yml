#
# Builds and pushes the multi-arch backend + frontend + ml images on a version tag.
# Tags are cut on Forgejo and reach GitHub via the push-mirror, which fires this
# workflow. GHCR is pushed with the built-in GITHUB_TOKEN (no secret needed).
# (ml is the optional semantic-search sidecar — its own Dockerfile, opt-in at deploy.)
#
# Each arch is built NATIVELY on its own runner (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm) and pushed by digest; a per-image merge job then assembles the
# multi-arch manifest. This avoids QEMU emulation, which made the arm64 `next build`
# of the frontend take ~20 min. See docker/build-push-action "multi-runner" pattern.

name: Release images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build, e.g. 1.0.2 (defaults to the current tag). Use a prerelease like 0.0.0-citest for a throwaway test build — it won't move :latest."
        required: false
        type: string

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    # Only run on GitHub Actions. The Forgejo mirror may surface this file too, but it
    # has no runner today — this guard keeps it a no-op there even if one is added.
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { image: backend,  dockerfile: ./Dockerfile,    target: backend,  arch: amd64, runner: ubuntu-latest }
          - { image: backend,  dockerfile: ./Dockerfile,    target: backend,  arch: arm64, runner: ubuntu-24.04-arm }
          - { image: frontend, dockerfile: ./Dockerfile,    target: frontend, arch: amd64, runner: ubuntu-latest }
          - { image: frontend, dockerfile: ./Dockerfile,    target: frontend, arch: arm64, runner: ubuntu-24.04-arm }
          - { image: ml,       dockerfile: ./ml/Dockerfile, target: ml,       arch: amd64, runner: ubuntu-latest }
          - { image: ml,       dockerfile: ./ml/Dockerfile, target: ml,       arch: arm64, runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push by digest (${{ matrix.image }}/${{ matrix.arch }})
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/${{ matrix.arch }}
          provenance: false
          # Push by digest only (no tag); the merge job assembles the tagged manifest.
          outputs: type=image,name=ghcr.io/nielsfranke/contactsheet-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          # Per-arch cache scope so the two runners don't clobber each other's cache.
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.image }}-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Assemble the per-arch digests into a single multi-arch manifest per image.
  merge:
    needs: build
    if: ${{ github.server_url == 'https://github.com' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        image: [backend, frontend, ml]
    steps:
      - name: Resolve version and tags
        id: meta
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          [ -n "$VERSION" ] || VERSION="${GITHUB_REF_NAME#v}"
          IMG="ghcr.io/nielsfranke/contactsheet-${{ matrix.image }}"
          # :latest only moves for final releases (skip on prereleases like 1.0.2-rc1 / *-citest).
          is_final=true
          case "$VERSION" in *-*) is_final=false ;; esac
          TAGS="-t ${IMG}:${VERSION}"
          $is_final && TAGS="${TAGS} -t ${IMG}:latest"
          echo "img=$IMG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-${{ matrix.image }}-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push multi-arch manifest
        working-directory: /tmp/digests
        run: |
          set -euo pipefail
          docker buildx imagetools create ${{ steps.meta.outputs.tags }} \
            $(printf '${{ steps.meta.outputs.img }}@sha256:%s ' *)

      - name: Inspect
        run: docker buildx imagetools inspect ${{ steps.meta.outputs.img }}:${{ steps.meta.outputs.version }}

  # Publishes the GitHub release from the hand-written CHANGELOG entry.
  # Tag-pushes only — never on the workflow_dispatch test run.
  release:
    needs: merge
    if: ${{ github.server_url == 'https://github.com' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Assemble release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="$GITHUB_REF_NAME"
          VERSION="${TAG#v}"
          # Title from the ANNOTATED tag's message subject ("ContactSheet vX.Y.Z — …" → "vX.Y.Z — …").
          # Read it from the API, NOT local git: actions/checkout materializes the triggering tag as
          # a *lightweight* ref in the runner, so `git tag --format='%(contents:subject)'` returns the
          # commit subject instead of the tag message. The API always has the real annotated object.
          SUBJECT=""
          if [ "$(gh api "repos/$REPO/git/refs/tags/$TAG" --jq '.object.type')" = "tag" ]; then
            OBJ_SHA="$(gh api "repos/$REPO/git/refs/tags/$TAG" --jq '.object.sha')"
            SUBJECT="$(gh api "repos/$REPO/git/tags/$OBJ_SHA" --jq '.message' | head -n1)"
          fi
          TITLE="${SUBJECT#ContactSheet }"
          [ -n "$TITLE" ] || TITLE="$TAG"
          PREV="$(git describe --tags --abbrev=0 "$TAG^" 2>/dev/null || true)"
          {
            python3 scripts/changelog-extract.py "$VERSION"
            if [ -n "$PREV" ]; then
              echo
              echo "**Full changelog:** https://github.com/$REPO/compare/$PREV...$TAG"
            fi
          } > notes.md
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"

      - name: Publish the GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.notes.outputs.tag }}
          TITLE: ${{ steps.notes.outputs.title }}
        run: |
          set -euo pipefail
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release edit "$TAG" --title "$TITLE" --notes-file notes.md
          else
            gh release create "$TAG" --title "$TITLE" --notes-file notes.md --verify-tag
          fi
